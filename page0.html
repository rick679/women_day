<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#fff0f6;
        text-align:center;
        padding:20px;
    }

    .container{
        max-width:400px;
        width:100%;
    }

    h1{
        color : #fa1671;
        font-size:30px;
        margin-bottom:25px;
    }

    .image{
        width:300px;
        margin-bottom:25px;
    }

    .buttons{
        display:flex;
        justify-content:center;
        gap:20px;
    }

    button{
        border:none;
        padding:12px 28px;
        border-radius:25px;
        font-size:16px;
        cursor:pointer;
        transition:0.2s;
    }

    .back{
        background:#ff6fa9;
        color:white;
        position:relative;
    }

    button:hover{
        transform:scale(1.05);
    }
    @media (max-width:480px){

        h1{
            font-size:30px;
        }

        .image{
            width:300px;
        }

        button{
            padding:10px 22px;
            font-size:14px;
        }

    }

</style>
</head>
