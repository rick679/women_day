<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<title>For You ❤️</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins',sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#ffe6f0;
        padding:20px;
    }

    .container{
        max-width:500px;
        width:100%;
        text-align:center;
    }

    .title{
        font-family:'Poppins',sans-serif;
        font-size:40px;
        color:#ff2f7d;
        line-height:1.2;
        margin-bottom:20px;
    }

    .image{
        width:220px;
        margin-bottom:25px;
    }

    .next{
        background:#b22222;
        color:white;
        border:none;
        padding:12px 30px;
        border-radius:25px;
        font-size:16px;
        cursor:pointer;
        transition:0.2s;
    }

    .next:hover{
        transform:scale(1.05);
    }

    @media(max-width:480px){

        .title{
            font-family: 'Pacifico', cursive;
            font-size:35px;
        }
        .image{
            width:180px;
        }

    }

</style>
</head>

<body>

    <div class="container">
        <h1 class="title">
            Happy Women's Day <br> Myyy beautifull babyyyyy
        </h1>
        <img class="image" src="img1.png">
        <br>
        <a href="page3.html"><button class="next">NEXT</button></a>
    </div>
</body>
</html>
