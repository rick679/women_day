<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<title>For You ❤️</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        height:100vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        font-family:'Poppins',sans-serif;
        background:linear-gradient(135deg,#ffd6ec,#fff2f8);
        text-align:center;
        padding:20px;
    }

    .title{
        font-family:'Great Vibes',cursive;
        font-size:40px;
        color:#ff4f8b;
        margin-bottom:30px;
    }

    .note{
        background:white;
        padding:18px 22px;
        border-radius:18px;
        box-shadow:0 10px 25px rgba(0,0,0,0.12);
        max-width:320px;
        margin-bottom:25px;
        font-size:15px;
        line-height:1.6;
        display:none;
    }

    button{
        border:none;
        background:#ff4f8b;
        color:white;
        padding:12px 28px;
        border-radius:30px;
        font-size:16px;
        cursor:pointer;
        transition:0.2s;
    }

    .back{
        background:#ff4f8b;
        color:white;
        position:relative;
    }

    .buttons{
        display:flex;
        justify-content:center;
        margin-top: 20px;
        gap:20px;
    }

    button:hover{
        transform:scale(1.05);
    }

    .hearts{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        overflow:hidden;
        z-index:-1;
    }

    .heart{
        position:absolute;
        font-size:20px;
        animation:float 7s linear infinite;
        opacity:0.6;
    }


    @keyframes float{

        0%{
            transform:translateY(100vh);
            opacity:0;
        }

        50%{
            opacity:1;
        }

        100%{
            transform:translateY(-10vh);
            opacity:0;
        }

    }

</style>
</head>

<body>

    <div class="title">Reasons I Love You So Much ❤️</div>

    <div class="note" id="note"></div>

    <button onclick="showReason()">Show another reason <br> (click me 🥰)</button>
    <div class="buttons">
            <a href="page3.html"><button class="back" id="noBtn"><b>GO BACK</b></button></a>
    </div>
    <div class="hearts">
        <div class="heart" style="left:10%;animation-delay:0s;">❤️</div>
        <div class="heart" style="left:25%;animation-delay:2s;">💖</div>
        <div class="heart" style="left:40%;animation-delay:4s;">💕</div>
        <div class="heart" style="left:60%;animation-delay:1s;">💗</div>
        <div class="heart" style="left:80%;animation-delay:3s;">💞</div>
    </div>

    <script>

        const reasons = [
            "When you act like a cute babyyyy.",
            "When you seek attention from me.",
            "When you talk about something happend to you.",
            "When you share your day with meee.",
            "When you call me at the middle of the night.",
            "And mostly your beautiful laugh and smile.",
            "And honestly… I just love you so much ❤️"
        ];

        let index = 0;

        function showReason(){

            const note = document.getElementById("note");

            note.style.display = "block";
            note.innerText = reasons[index];

            index++;

            if(index >= reasons.length){
                index = 0;  
            }

        }

    </script>

</body>
</html>
